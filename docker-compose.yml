version: '3.8'

services:
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  api:
    build: 
      context: ./Server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/courier-reconciliation
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=5000
    depends_on:
      - mongodb
      - redis

  worker:
    build:
      context: ./Server
      dockerfile: Dockerfile.worker
    environment:
      - MONGO_URI=mongodb://mongodb:27017/courier-reconciliation
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  client:
    build:
      context: ./Client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://api:5000
    depends_on:
      - api

volumes:
  mongo-data:
